<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="user-profile">
                    <span class="avatar">G</span>
                    <span class="username">Gabung</span>
                </div>
            </div>

            <nav class="main-nav">
                <ul>
                    <li data-view="add-task" class="active">
                        <a href="#"><span class="icon">+</span> Add Task </a>
                        <span class="count" id="count-add-task">0</span>
                    </li>
                    <li data-view="today">
                        <a href="#"><span class="icon">📅</span> Today </a>
                        <span class="count" id="count-today">0</span>
                    </li>
                    <li data-view="upcoming">
                        <a href="#"><span class="icon">🗓️</span> Upcoming </a>
                        <span class="count" id="count-upcoming">0</span>
                    </li>
                    <li data-view="done">
                        <a href="#"><span class="icon">👌</span> Done </a>
                        <span class="count" id="count-done">0</span>
                    </li>
                    <li data-view="all">
                        <a href="#"><span class="icon">📂</span> All Tasks </a>
                        <span class="count" id="count-all">0</span>
                    </li>
                </ul>
                
            <div class="help-section">
                <span class="icon">❓</span> Help & resources
            </div>
                
            </nav>
        </aside>

        <main class="content">
            <header class="content-header">
                <div class="breadcrumbs">
                    <span>My Note</span>
                </div>
                <h1 id="content-title">+ Add Task</h1>
            </header>

            <div class="task-input-container" id="task-input-box">
                <input type="text" id="task-title" class="task-title-input" placeholder="What do you need to do?">
                <input type="text" id="task-desc" class="task-desc-input" placeholder="Description">
                
                <div class="task-input-controls">
                    <div class="left-controls">
                        <input type="date" id="task-date" class="task-date-input">
                    </div>
                </div>
                <div class="task-input-actions">
                    <h2> </h2>
                    <div class="action-buttons">
                        <button class="btn-cancel" id="btn-cancel">Cancel</button>
                        <button class="btn-submit" id="btn-submit">Add task</button>
                    </div>
                </div>
            </div>

            <div class="task-list">
                <div class="task-section">
                    <h3 class="section-title"><span id="section-icon">📝</span> <span id="section-text">Daftar Tugas</span> <span id="task-count" class="section-count">0</span></h3>
                    <ul class="tasks" id="dynamic-task-list"></ul>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
